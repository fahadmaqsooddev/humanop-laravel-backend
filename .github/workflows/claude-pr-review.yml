name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    branches: [b2c-dev]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}

            You are a senior Laravel 9 engineer reviewing this pull request.

            INSTRUCTIONS:
            1. Read the CLAUDE.md file at the project root for full project context and review rules.
            2. Use `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff.
            3. Review the entire PR diff thoroughly for:
               - Bugs, logic errors, and incorrect behavior
               - Security vulnerabilities (SQL injection, XSS, mass assignment, hardcoded secrets)
               - N+1 queries and performance issues
               - Missing error handling on external API calls (Stripe, Twilio, AWS, OpenAI)
               - Violations of project conventions documented in CLAUDE.md
            4. For each issue found, use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` to leave inline comments on the specific file and line.
            5. DO NOT flag code style/formatting issues (StyleCI handles this).
            6. DO NOT suggest refactors or improvements unless they fix an actual bug.

            SEVERITY GUIDE:
            - critical: Security vulnerabilities, data loss, crashes, broken business logic
            - high: Bugs that affect functionality, missing auth checks, N+1 in hot paths
            - medium: Missing error handling, potential edge cases, minor logic issues
            - low: Non-critical improvements that could prevent future bugs

            APPROVAL DECISION:
            - If there are ZERO critical or high severity issues, set approved to true.
            - If there is ANY critical or high severity issue, set approved to false.
            - Medium/low issues should still be commented on but do not block approval.

            After reviewing, use `gh pr comment ${{ github.event.pull_request.number }}` to post a summary comment.

            Return your structured JSON assessment.
          claude_args: |
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"
            --json-schema '{"type":"object","properties":{"approved":{"type":"boolean","description":"true if no critical or high severity issues found"},"summary":{"type":"string","description":"Brief review summary"},"issues":{"type":"array","items":{"type":"object","properties":{"file":{"type":"string"},"line":{"type":"number"},"severity":{"type":"string","enum":["critical","high","medium","low"]},"description":{"type":"string"}},"required":["file","severity","description"]}}},"required":["approved","summary","issues"]}'

      - name: Auto-approve clean PR
        if: always() && steps.review.outcome == 'success' && fromJSON(steps.review.outputs.structured_output).approved == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --approve \
            --body "## Claude AI Review: Approved

          No critical or high-severity issues found. Auto-approving this PR.

          *Reviewed by Claude Code*"

      - name: Auto-merge clean PR
        if: always() && steps.review.outcome == 'success' && fromJSON(steps.review.outputs.structured_output).approved == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --subject "Merge PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

      - name: Comment on PR with issues
        if: always() && steps.review.outcome == 'success' && fromJSON(steps.review.outputs.structured_output).approved == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Claude AI Review: Changes Requested

          Critical or high-severity issues were found in this PR. Please review the inline comments above and address them before this PR can be merged.

          Once the issues are fixed, push your changes and the review will re-run automatically.

          *Reviewed by Claude Code*"

      - name: Handle review failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Claude AI Review: Error

          The automated review encountered an error and could not complete. A manual review is required for this PR.

          *Reviewed by Claude Code*"
