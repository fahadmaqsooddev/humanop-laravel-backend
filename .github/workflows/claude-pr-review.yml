name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    branches: [b2c-dev]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }}: "${{ github.event.pull_request.title }}" in ${{ github.repository }}.

            INSTRUCTIONS - Follow these steps in order, be efficient, do NOT explore the codebase beyond what is needed:

            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the diff.
            2. Read CLAUDE.md at the project root for review rules.
            3. Review ONLY the changed lines in the diff for:
               - Bugs, logic errors, incorrect behavior
               - Security vulnerabilities (SQL injection, XSS, mass assignment, hardcoded secrets)
               - N+1 queries, missing error handling on external APIs
               - Violations of project conventions in CLAUDE.md
            4. Only read additional files if you need context to understand a specific change in the diff. Do NOT read files that are not related to the diff.
            5. For issues found, use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`.
            6. DO NOT flag code style issues (StyleCI handles this).
            7. DO NOT suggest refactors unless they fix a bug.

            SEVERITY: critical (security, data loss, crashes), high (bugs, missing auth), medium (missing error handling), low (potential future bugs).

            DECISION - After reviewing, do ONE of these:

            If ZERO critical/high issues:
            1. Run: gh pr review ${{ github.event.pull_request.number }} --approve --body "## Claude AI Review: Approved\n\nNo critical or high-severity issues found.\n\n*Reviewed by Claude Code*"
            2. Run: gh pr merge ${{ github.event.pull_request.number }} --squash --subject "Merge PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

            If ANY critical/high issues:
            1. Run: gh pr comment ${{ github.event.pull_request.number }} --body "## Claude AI Review: Changes Requested\n\nPlease fix the issues in the inline comments and push again.\n\n*Reviewed by Claude Code*"
            2. Do NOT approve or merge.
          claude_args: |
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr merge:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"

      - name: Handle review failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Claude AI Review: Error

          The automated review encountered an error and could not complete. A manual review is required for this PR.

          *Reviewed by Claude Code*"
